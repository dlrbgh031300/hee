<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>주간 누적 프로모션 계산기</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

:root{
  --bg:#0f1117;
  --card:#1a1d27;
  --card-border:#2a2d3a;

  --text:#e8e9ed;
  --text-dim:#8b8d98;

  --entry:#9ca3af;
  --bronze:#cd7f32;
  --silver:#c0c7d1;
  --gold:#facc15;
  --diamond:#38bdf8;
  --master:#c084fc;
  --legend:#f97316;

  --accent:#38d9a9;
}

html{
  -webkit-text-size-adjust:100%;
}

body{
  font-family:'Noto Sans KR', sans-serif;
  background:var(--bg);
  color:var(--text);

  min-height:100vh;

  display:flex;
  justify-content:center;

  padding:18px 12px;
}

.container{
  width:100%;
  max-width:520px;
  overflow:hidden;
}

/* TITLE */

h1{
  font-size:1.2rem;
  font-weight:800;

  text-align:center;

  margin-bottom:20px;

  color:var(--accent);

  line-height:1.4;
}

/* INPUT */

.input-section{
  background:var(--card);

  border:1px solid var(--card-border);
  border-radius:16px;

  padding:18px;

  margin-bottom:16px;
}

.input-section label{
  display:block;

  font-size:.82rem;
  font-weight:700;

  color:var(--text-dim);

  margin-bottom:10px;
}

.input-row{
  display:flex;
  align-items:center;
  gap:10px;
  width:100%;
}

.input-row input{
  flex:1;
  width:100%;
  min-width:0;

  background:var(--bg);

  border:2px solid var(--card-border);
  border-radius:12px;

  color:var(--text);

  padding:14px 12px;

  font-family:'JetBrains Mono', monospace;
  font-size:1.55rem;
  font-weight:700;

  text-align:center;

  outline:none;

  transition:.2s;
}

.input-row input:focus{
  border-color:var(--accent);
}

.input-row input::placeholder{
  color:#3a3d4a;
}

.input-row .unit{
  flex-shrink:0;
  white-space:nowrap;

  color:var(--text-dim);

  font-size:1rem;
  font-weight:700;
}

/* RESULT CARD */

.result-card{
  background:var(--card);

  border:1px solid var(--card-border);
  border-radius:16px;

  padding:20px 16px;

  margin-bottom:16px;

  text-align:center;

  opacity:.45;

  transition:.25s;
}

.result-card.active{
  opacity:1;
}

.result-card.active.entry{
  border-color:var(--entry);
}

.result-card.active.bronze{
  border-color:var(--bronze);
}

.result-card.active.silver{
  border-color:var(--silver);
}

.result-card.active.gold{
  border-color:var(--gold);
}

.result-card.active.diamond{
  border-color:var(--diamond);
}

.result-card.active.master{
  border-color:var(--master);
}

.result-card.active.legend{
  border-color:var(--legend);
}

.tier-badge{
  display:inline-flex;
  align-items:center;
  gap:6px;

  padding:6px 12px;

  border-radius:999px;

  background:#252836;

  font-size:.78rem;
  font-weight:800;

  letter-spacing:.5px;

  margin-bottom:14px;
}

.tier-badge.entry{ color:var(--entry); }
.tier-badge.bronze{ color:var(--bronze); }
.tier-badge.silver{ color:var(--silver); }
.tier-badge.gold{ color:var(--gold); }
.tier-badge.diamond{ color:var(--diamond); }
.tier-badge.master{ color:var(--master); }
.tier-badge.legend{ color:var(--legend); }

.no-tier{
  color:var(--text-dim);
  font-size:.88rem;
}

.result-total-label{
  font-size:.78rem;
  color:var(--text-dim);

  margin-bottom:6px;
}

.result-total{
  font-family:'JetBrains Mono', monospace;

  font-size:2rem;
  font-weight:700;

  color:var(--accent);

  line-height:1.15;
  letter-spacing:-1px;

  margin-bottom:16px;

  word-break:keep-all;
}

/* BREAKDOWN */

.breakdown{
  text-align:left;

  border-top:1px solid var(--card-border);

  padding-top:12px;
}

.breakdown-title{
  font-size:.72rem;
  color:var(--text-dim);

  text-transform:uppercase;
  letter-spacing:1px;

  margin-bottom:10px;

  font-weight:700;
}

.bd-row{
  display:flex;
  flex-direction:column;

  align-items:flex-start;

  gap:2px;

  padding:8px 0;

  font-size:.82rem;
}

.bd-label{
  color:var(--text-dim);

  line-height:1.45;

  font-size:.78rem;
}

.bd-tier{
  font-weight:800;
}

.bd-value{
  font-family:'JetBrains Mono', monospace;

  font-size:.82rem;
  font-weight:700;

  color:var(--text);
}

.bd-row.entry .bd-tier{ color:var(--entry); }
.bd-row.bronze .bd-tier{ color:var(--bronze); }
.bd-row.silver .bd-tier{ color:var(--silver); }
.bd-row.gold .bd-tier{ color:var(--gold); }
.bd-row.diamond .bd-tier{ color:var(--diamond); }
.bd-row.master .bd-tier{ color:var(--master); }
.bd-row.legend .bd-tier{ color:var(--legend); }

/* TIER TABLE */

.tier-table{
  overflow:hidden;

  background:var(--card);

  border:1px solid var(--card-border);
  border-radius:16px;
}

.tier-table .header{
  display:grid;
  grid-template-columns:1.2fr .9fr .7fr;

  padding:10px 12px;

  background:#22252f;

  font-size:.65rem;
  font-weight:700;

  color:var(--text-dim);

  text-transform:uppercase;
  letter-spacing:1px;
}

.tier-row{
  display:grid;
  grid-template-columns:1.2fr .9fr .7fr;

  align-items:center;

  padding:12px;

  border-top:1px solid #1f222c;

  transition:.2s;
}

.tier-row.highlight{
  background:#1f2d2d;
}

.tier-row .name{
  display:flex;
  align-items:center;
  gap:5px;

  font-weight:800;

  font-size:.78rem;
}

.tier-row .range,
.tier-row .per{
  font-family:'JetBrains Mono', monospace;

  font-size:.7rem;

  color:var(--text-dim);
}

.tier-row.highlight .range,
.tier-row.highlight .per{
  color:var(--text);
}

.tier-row .per{
  text-align:right;
}

.dot{
  width:8px;
  height:8px;

  border-radius:50%;

  display:inline-block;

  flex-shrink:0;
}

.dot.entry{ background:var(--entry); }
.dot.bronze{ background:var(--bronze); }
.dot.silver{ background:var(--silver); }
.dot.gold{ background:var(--gold); }
.dot.diamond{ background:var(--diamond); }
.dot.master{ background:var(--master); }
.dot.legend{ background:var(--legend); }

/* SMALL MOBILE */

@media (max-width:480px){

  body{
    padding:14px 10px;
  }

  h1{
    font-size:1.05rem;
  }

  .input-section{
    padding:16px;
  }

  .input-row input{
    font-size:1.35rem;
    padding:12px 10px;
  }

  .result-card{
    padding:18px 14px;
  }

  .result-total{
    font-size:1.75rem;
  }

  .tier-badge{
    font-size:.72rem;
    padding:5px 10px;
  }

  .bd-label{
    font-size:.72rem;
  }

  .bd-value{
    font-size:.76rem;
  }

  .tier-table .header{
    font-size:.58rem;
    padding:9px 10px;
  }

  .tier-row{
    padding:10px;
  }

  .tier-row .name{
    font-size:.72rem;
  }

  .tier-row .range,
  .tier-row .per{
    font-size:.62rem;
  }
}

/* IPHONE MINI */

@media (max-width:375px){

  .tier-row{
    grid-template-columns:1.1fr .85fr .65fr;
  }

  .tier-row .name{
    font-size:.66rem;
  }

  .tier-row .range,
  .tier-row .per{
    font-size:.56rem;
  }

  .result-total{
    font-size:1.55rem;
  }
}
</style>
</head>

<body>

<div class="container">

  <h1>주간 누적 프로모션 계산기</h1>

  <div class="input-section">

    <label>수 ~ 차주 화 배달 완료 건수</label>

    <div class="input-row">

      <input
        type="number"
        id="count"
        placeholder="0"
        min="0"
      />

      <span class="unit">건</span>

    </div>

  </div>

  <div class="result-card" id="resultCard">

    <div id="tierBadge"></div>

    <div class="result-total-label">
      총 프로모션
    </div>

    <div class="result-total" id="totalAmt">
      0원
    </div>

    <div class="breakdown" id="breakdown"></div>

  </div>

  <div class="tier-table">

    <div class="header">
      <span>등급</span>
      <span>구간</span>
      <span style="text-align:right;">건당</span>
    </div>

    <div class="tier-row" data-tier="entry">
      <span class="name"><span class="dot entry"></span>ENTRY</span>
      <span class="range">121 ~ 150</span>
      <span class="per">200원</span>
    </div>

    <div class="tier-row" data-tier="bronze">
      <span class="name"><span class="dot bronze"></span>BRONZE</span>
      <span class="range">151 ~ 200</span>
      <span class="per">500원</span>
    </div>

    <div class="tier-row" data-tier="silver">
      <span class="name"><span class="dot silver"></span>SILVER</span>
      <span class="range">201 ~ 250</span>
      <span class="per">800원</span>
    </div>

    <div class="tier-row" data-tier="gold">
      <span class="name"><span class="dot gold"></span>GOLD</span>
      <span class="range">251 ~ 300</span>
      <span class="per">1,000원</span>
    </div>

    <div class="tier-row" data-tier="diamond">
      <span class="name"><span class="dot diamond"></span>DIAMOND</span>
      <span class="range">301 ~ 330</span>
      <span class="per">1,200원</span>
    </div>

    <div class="tier-row" data-tier="master">
      <span class="name"><span class="dot master"></span>MASTER</span>
      <span class="range">331 ~ 360</span>
      <span class="per">1,300원</span>
    </div>

    <div class="tier-row" data-tier="legend">
      <span class="name"><span class="dot legend"></span>LEGEND</span>
      <span class="range">361+</span>
      <span class="per">1,400원</span>
    </div>

  </div>

</div>

<script>
const bands = [
  { name:'ENTRY', key:'entry', from:121, to:150, per:200 },
  { name:'BRONZE', key:'bronze', from:151, to:200, per:500 },
  { name:'SILVER', key:'silver', from:201, to:250, per:800 },
  { name:'GOLD', key:'gold', from:251, to:300, per:1000 },
  { name:'DIAMOND', key:'diamond', from:301, to:330, per:1200 },
  { name:'MASTER', key:'master', from:331, to:360, per:1300 },
  { name:'LEGEND', key:'legend', from:361, to:Infinity, per:1400 }
];

const icons = {
  entry:'🚀',
  bronze:'🥉',
  silver:'🥈',
  gold:'🥇',
  diamond:'💎',
  master:'👑',
  legend:'🏆'
};

document
  .getElementById('count')
  .addEventListener('input', calc);

function calc(){

  const n =
    parseInt(document.getElementById('count').value) || 0;

  const card =
    document.getElementById('resultCard');

  const badge =
    document.getElementById('tierBadge');

  const totalEl =
    document.getElementById('totalAmt');

  const bdEl =
    document.getElementById('breakdown');

  document
    .querySelectorAll('.tier-row')
    .forEach(r => r.classList.remove('highlight'));

  card.className = 'result-card';

  if(n < 121){

    badge.innerHTML =
      '<span class="no-tier">121건 이상부터 적용</span>';

    totalEl.textContent = '0원';

    bdEl.innerHTML = '';

    return;
  }

  let total = 0;
  let topTier = null;
  let rows = '';

  for(const b of bands){

    if(n < b.from) break;

    const upper =
      Math.min(n, b.to);

    const count =
      upper - b.from + 1;

    if(count <= 0) continue;

    const amt =
      count * b.per;

    total += amt;

    topTier = b;

    rows += `
      <div class="bd-row ${b.key}">

        <span class="bd-label">

          <span class="bd-tier">
            ${icons[b.key]} ${b.name}
          </span>

          ${b.from} ~ ${upper}건
          (${count}건 × ${b.per.toLocaleString()}원)

        </span>

        <span class="bd-value">
          ${amt.toLocaleString()}원
        </span>

      </div>
    `;

    document
      .querySelector(
        '.tier-row[data-tier="' + b.key + '"]'
      )
      .classList.add('highlight');
  }

  card.classList.add('active');
  card.classList.add(topTier.key);

  badge.innerHTML = `
    <span class="tier-badge ${topTier.key}">
      ${icons[topTier.key]}
      ${topTier.name}
    </span>
  `;

  totalEl.textContent =
    total.toLocaleString() + '원';

  bdEl.innerHTML = `
    <div class="breakdown-title">
      구간별 누적 내역
    </div>

    ${rows}
  `;
}

calc();
</script>

</body>
</html>
